apiVersion: apps/v1
kind: Deployment
metadata:
  name: tienda-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tienda-frontend
  template:
    metadata:
      labels:
        app: tienda-frontend
    spec:
      containers:
        - name: frontend
          image: 018147952742.dkr.ecr.us-east-1.amazonaws.com/tienda-frontend:latest
          ports:
            - containerPort: 80